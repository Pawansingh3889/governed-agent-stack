<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#ffffff}</style>
</head>
<body>
<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="56" font-size="34" font-weight="700" fill="#0f172a">Governed Agent Stack</text>
  <text x="61" y="86" font-size="17" fill="#64748b">How one plain-English question flows: on-prem, scoped, and auditable</text>

  <!-- Group boxes -->
  <rect x="52" y="224" width="288" height="152" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="66" y="248" font-size="12" font-weight="700" fill="#6366f1" letter-spacing="1.5">FOUNDATIONS</text>

  <rect x="440" y="224" width="320" height="152" rx="14" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.5"/>
  <text x="454" y="248" font-size="12" font-weight="700" fill="#0891b2" letter-spacing="1.5">REASONING</text>

  <rect x="362" y="404" width="456" height="140" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="376" y="428" font-size="12" font-weight="700" fill="#16a34a" letter-spacing="1.5">SCOPED ACCESS</text>

  <rect x="872" y="404" width="288" height="140" rx="14" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="886" y="428" font-size="12" font-weight="700" fill="#dc2626" letter-spacing="1.5">ACCOUNTABILITY</text>

  <!-- Question -->
  <rect x="455" y="118" width="270" height="58" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="590" y="153" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Question in plain English</text>

  <!-- schema-scout -->
  <rect x="68" y="262" width="256" height="92" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5" filter="url(#sh)"/>
  <text x="84" y="296" font-size="19" font-weight="700" fill="#4338ca">schema-scout</text>
  <text x="84" y="320" font-size="13" fill="#475569">map &#183; relationships</text>
  <text x="84" y="340" font-size="13" fill="#475569">PII &#183; readiness score</text>

  <!-- FloorMind -->
  <rect x="456" y="262" width="288" height="92" rx="12" fill="#ffffff" stroke="#a5f3fc" stroke-width="1.5" filter="url(#sh)"/>
  <text x="472" y="296" font-size="19" font-weight="700" fill="#0e7490">FloorMind</text>
  <text x="472" y="320" font-size="13" fill="#475569">question &#8594; SQL &#8594; answer</text>
  <text x="472" y="340" font-size="13" fill="#64748b">measured by evals, not vibes</text>

  <!-- sql-sop -->
  <rect x="372" y="442" width="128" height="80" rx="12" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="388" y="476" font-size="16" font-weight="700" fill="#15803d">sql-sop</text>
  <text x="388" y="498" font-size="12" fill="#475569">SQL safety lint</text>

  <!-- query-warden -->
  <rect x="512" y="442" width="152" height="80" rx="12" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="528" y="476" font-size="15.5" font-weight="700" fill="#15803d">query-warden</text>
  <text x="528" y="498" font-size="12" fill="#475569">role-based access</text>

  <!-- sql-explorer-mcp -->
  <rect x="676" y="442" width="132" height="80" rx="12" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="690" y="476" font-size="13" font-weight="700" fill="#15803d">sql-explorer-mcp</text>
  <text x="690" y="498" font-size="12" fill="#475569">read-only</text>

  <!-- agent-blackbox -->
  <rect x="888" y="442" width="258" height="80" rx="12" fill="#ffffff" stroke="#fecaca" stroke-width="1.5" filter="url(#sh)"/>
  <text x="904" y="476" font-size="18" font-weight="700" fill="#b91c1c">agent-blackbox</text>
  <text x="904" y="498" font-size="13" fill="#475569">tamper-evident log</text>

  <!-- Database cylinder -->
  <path d="M490,572 L490,642 A100,14 0 0 0 690,642 L690,572" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <ellipse cx="590" cy="572" rx="100" ry="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="590" y="606" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">SQL Server</text>
  <text x="590" y="626" text-anchor="middle" font-size="13" fill="#64748b">stays on-prem</text>

  <!-- Answer -->
  <rect x="470" y="694" width="240" height="58" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="590" y="729" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Answer + chart</text>

  <!-- Solid connectors -->
  <line x1="590" y1="176" x2="590" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="324" y1="308" x2="452" y2="308" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="388" y="300" text-anchor="middle" font-size="12" fill="#64748b">schema context</text>

  <line x1="585" y1="354" x2="438" y2="438" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="396" text-anchor="middle" font-size="12" fill="#64748b">generated SQL</text>

  <line x1="502" y1="482" x2="510" y2="482" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="666" y1="482" x2="674" y2="482" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="730" y1="522" x2="654" y2="560" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="590" y1="658" x2="590" y2="690" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="606" y="680" font-size="12" fill="#64748b">rows</text>

  <!-- Audit (dashed amber) -->
  <path d="M744,300 C836,300 836,468 884,468" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowAmber)"/>
  <line x1="810" y1="482" x2="884" y2="482" stroke="#d97706" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowAmber)"/>
  <text x="815" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">every step logged</text>

  <!-- sql-steward flagship -->
  <rect x="800" y="110" width="360" height="74" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5" filter="url(#sh)"/>
  <text x="816" y="138" font-size="18" font-weight="700" fill="#b45309">sql-steward</text>
  <text x="816" y="160" font-size="12.5" fill="#78716c">all-in-one gateway &#183; the agent never writes SQL</text>
  <text x="816" y="178" font-size="11.5" fill="#a8a29e">compiles SQL from a semantic layer &#183; SQL Server / Postgres / SQLite</text>
  <line x1="726" y1="150" x2="796" y2="150" stroke="#b45309" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowAmber)"/>
  <text x="761" y="142" text-anchor="middle" font-size="11" fill="#b45309">or</text>

  <!-- pii-veil result masking (optional) -->
  <rect x="724" y="584" width="184" height="60" rx="12" fill="#ffffff" stroke="#fbcfe8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="740" y="612" font-size="15" font-weight="700" fill="#be185d">pii-veil</text>
  <text x="740" y="632" font-size="12" fill="#475569">result masking (optional)</text>
  <line x1="690" y1="607" x2="720" y2="610" stroke="#d97706" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowAmber)"/>
  <text x="705" y="598" text-anchor="middle" font-size="11" fill="#b45309">results</text>

  <!-- Footer -->
  <text x="60" y="794" font-size="13" fill="#94a3b8">Free &#183; open source &#183; sits on your existing SQL Server estate</text>
  <text x="1140" y="794" text-anchor="end" font-size="13" fill="#94a3b8">github.com/Pawansingh3889/governed-agent-stack</text>
</svg>
</body>
</html>
